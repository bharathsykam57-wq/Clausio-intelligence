services:
  db:
    image: ankane/pgvector:latest
    container_name: clausio_db
    environment:
      POSTGRES_USER: lexia
      POSTGRES_PASSWORD: lexia
      POSTGRES_DB: lexia
    ports: ["5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clausio_redis
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clausio_backend
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - DATABASE_URL=postgresql://lexia:lexia@db:5432/lexia
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGINS=["http://localhost:3000"]
      - ENVIRONMENT=development
      - DEBUG=true
    ports: ["8000:8000"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes: [./backend:/app]
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: clausio_frontend
    working_dir: /app
    volumes: [./frontend:/app]
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    depends_on: [backend]

volumes:
  pgdata:
  redisdata:
